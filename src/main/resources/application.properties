server.port=${PORT:8080}
spring.application.name=upuai-validation-api

# Disable auto-config for datasource and redis — configured conditionally
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Multipart uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=52MB

# Schema initialization (runs schema.sql via JDBC)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
